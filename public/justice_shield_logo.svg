<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B3FE4"/>
      <stop offset="100%" stop-color="#6C4FF0"/>
    </linearGradient>
  </defs>

  <!-- Shield shape (filled with gradient, transparent canvas around it) -->
  <path d="M200 30
           L340 80
           L340 200
           C340 290 280 350 200 380
           C120 350 60 290 60 200
           L60 80
           Z"
        fill="url(#shieldGradient)"/>

  <!-- Scales of justice icon -->
  <g stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none">
    <!-- Vertical post -->
    <line x1="200" y1="110" x2="200" y2="290"/>
    <!-- Top finial -->
    <circle cx="200" cy="100" r="10" fill="#FFFFFF" stroke="none"/>
    <!-- Base -->
    <line x1="160" y1="290" x2="240" y2="290"/>
    <!-- Horizontal beam -->
    <line x1="130" y1="140" x2="270" y2="140"/>

    <!-- Left chain -->
    <line x1="130" y1="140" x2="100" y2="200"/>
    <line x1="130" y1="140" x2="160" y2="200"/>
    <!-- Left pan -->
    <path d="M95 200 C95 220 165 220 165 200"/>

    <!-- Right chain -->
    <line x1="270" y1="140" x2="240" y2="200"/>
    <line x1="270" y1="140" x2="300" y2="200"/>
    <!-- Right pan -->
    <path d="M235 200 C235 220 305 220 305 200"/>
  </g>
</svg>
